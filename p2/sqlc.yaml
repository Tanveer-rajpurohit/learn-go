version: "2"
sql:
  - schema: "db/migrations"
    queries: "db/query"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true        # ← adds json tags to all structs
        json_tags_case_style: "snake"  # ← "email", "created_at" etc.
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              package: uuid
              type: UUID